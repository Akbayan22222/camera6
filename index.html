<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banket HD Sniper - Medet</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        #header { width: 100%; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #owner-name { font-size: 1.2rem; font-weight: 800; color: #cda434; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #status { color: #00fbff; font-size: 0.8rem; text-transform: uppercase; }
        #main-view { position: relative; width: 95vw; height: 45vh; border-radius: 15px; overflow: hidden; border: 3px solid #333; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; height: 35vh; margin-top: 15px; }
        .slot { background: #111; border: 2px solid #cda434; border-radius: 10px; overflow: hidden; position: relative; }
        canvas { width: 100%; height: 100%; object-fit: cover; image-rendering: -webkit-optimize-contrast; /* Улучшение четкости */ }
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        button { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #btn-pick { background: #cda434; color: black; }
        #btn-reset { background: #222; color: white; border: 1px solid #444; }
        .active { border-color: #00fbff !important; box-shadow: 0 0 15px #00fbff; }
    </style>
</head>
<body>

    <div id="header">
        <div id="owner-name">MEDET MUHAMEDZHANOV</div>
        <div id="status">Загрузка ИИ...</div>
    </div>
    
    <div id="main-view">
        <video id="video" autoplay muted playsinline></video>
    </div>

    <div class="controls">
        <button id="btn-pick" disabled onclick="captureNext()">🎯 Поймать в окно <span id="next-slot-num">1</span></button>
        <button id="btn-reset" onclick="resetSlots()">🔄 Сброс</button>
    </div>

    <div id="slots-grid">
        <div class="slot active" id="slot-0"></div>
        <div class="slot" id="slot-1"></div>
        <div class="slot" id="slot-2"></div>
        <div class="slot" id="slot-3"></div>
        <div class="slot" id="slot-4"></div>
        <div class="slot" id="slot-5"></div>
    </div>

    <script>
        const video = document.getElementById('video');
        const btnPick = document.getElementById('btn-pick');
        const status = document.getElementById('status');
        
        let detections = [];
        let currentSlot = 0;

        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            status.innerText = "Система готова";
            startStream();
        }

        async function startStream() {
            // Запрашиваем максимально возможное разрешение камеры
            const constraints = { 
                video: { 
                    facingMode: "environment",
                    width: { ideal: 1920 }, 
                    height: { ideal: 1080 } 
                } 
            };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                btnPick.disabled = false;
                runAI();
            };
        }

        async function runAI() {
            setInterval(async () => {
                if (video.readyState === 4) {
                    detections = await faceapi.detectAllFaces(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.4 }));
                }
            }, 500);
        }

        function captureNext() {
            if (currentSlot >= 6 || detections.length === 0) return;

            const target = detections[Math.floor(Math.random() * detections.length)];
            const { x, y, width, height } = target.box;

            const slotEl = document.getElementById(`slot-${currentSlot}`);
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Устанавливаем высокое разрешение для самого холста
            canvas.width = 600; 
            canvas.height = 600;

            // Включаем алгоритм сглаживания высокого качества
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            // Рисуем лицо, добавляя небольшой запас (padding) вокруг, чтобы не было только лицо на весь экран
            const pad = width * 0.2; 
            ctx.drawImage(video, x - pad/2, y - pad/2, width + pad, height + pad, 0, 0, 600, 600);

            slotEl.innerHTML = '';
            slotEl.appendChild(canvas);
            slotEl.classList.remove('active');

            currentSlot++;
            if (currentSlot < 6) {
                document.getElementById(`slot-${currentSlot}`).classList.add('active');
                document.getElementById('next-slot-num').innerText = currentSlot + 1;
            } else {
                btnPick.disabled = true;
            }
        }

        function resetSlots() {
            location.reload(); // Самый надежный способ очистить всё для ИИ
        }

        window.onload = init;
    </script>
</body>
</html>
